name: Post YouTube Short

on:
  schedule:
    # 2x/day — quality over quantity, let each video breathe
    - cron: "0 15 * * *"   # 11:00 AM ET — midday peak engagement
    - cron: "0 23 * * *"   #  7:00 PM ET — evening prime time
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  post-short:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Write credentials from secrets
        run: |
          mkdir -p data
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET }}' > data/client_secret.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > data/youtube_token.json

      - name: Post one YouTube Short
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL: deepseek/deepseek-chat-v3-0324
          YOUTUBE_CHANNEL_NAME: MASTERING MONEY
          YOUTUBE_HANDLE: "@masteringmoneyxyz"
          YOUTUBE_VIDEO_DURATION: "10"
          ELEVENLABS_ENABLED: "false"
          TIMEZONE: America/New_York
        run: python run_youtube.py post

      - name: Commit updated title history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_titles.json
          git diff --cached --quiet || git commit -m "Auto-update posted titles after upload"
          git push
